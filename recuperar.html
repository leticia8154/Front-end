<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Recuperar senha</title>
<link rel="stylesheet" href="css/globals.css" />
<link rel="stylesheet" href="css/recuperar.css" />
</head>
<body>
<main class="modelo-de-rascunho" data-model-id="60:1383">
<section class="container" aria-labelledby="page-title">
<header class="div">
<div class="image-estacia" aria-hidden="true"></div>
<div class="heading">
<h1 class="text-wrapper" id="page-title">Recuperar senha</h1>
</div>
<div class="paragraph">
<p class="p">Digite seu e-mail para receber as instruções</p>
</div>
</header>
<form class="form" action="#" method="post">
<div class="container-2">
<label class="label" for="email">
<img class="icon" src="https://c.animaapp.com/qEDfni1r/img/icon.svg" alt="" aria-hidden="true" />
<span class="text-wrapper-2">E-mail cadastrado</span>
</label>
<input
            class="email-input"
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="seu@email.com"
            aria-label="E-mail cadastrado"
            required
          />
</div>
<button class="button" type="submit">
<span class="text-wrapper-4">Enviar instruções</span>
</button>
<a href="index.html" class="button-2" type="button">
<img class="img" src="https://c.animaapp.com/qEDfni1r/img/icon-1.svg" alt="" aria-hidden="true" />
<span class="text-wrapper-5">Voltar ao login</span>
</a>
</form>
</section>
</main>
</body>
</html>
