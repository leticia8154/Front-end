<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8" />
    <title>Sistema de Estacionamento - EstacIA</title>
    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<main class="sistema-de" data-model-id="1:5">
    <section class="container" aria-labelledby="titulo-boas-vindas">
        
        <header class="div">
            <div class="image-estacia" aria-hidden="true"></div>
            <div class="heading">
                <h1 class="text-wrapper" id="titulo-boas-vindas">Bem-vindo!</h1>
            </div>
            <div class="paragraph">
                <p class="p">Estacionamento inteligente ao seu alcance</p>
            </div>
        </header>
        
        <nav class="container-2" aria-label="Ações de autenticação" style="display: flex; gap: 10px; justify-content: center;">
            <button class="button" type="button" aria-current="page">
                <img class="icon" src="https://c.animaapp.com/fHb26KMD/img/icon.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-2">Entrar</span>
            </button>
            
            <a href="cadastro.html" class="button-2" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">
                <img class="img" src="https://c.animaapp.com/fHb26KMD/img/icon-1.svg" alt="" aria-hidden="true" style="margin-right: 8px;" />
                <span class="text-wrapper-3">Cadastrar</span>
            </a>
        </nav>

        <form class="form" action="#" method="post">
            
            <div class="container-3">
                <label class="label" for="email">
                    <img class="icon-2" src="https://c.animaapp.com/fHb26KMD/img/icon-2.svg" alt="" aria-hidden="true" />
                    <span class="text-wrapper-4">E-mail</span>
                </label>
                <div class="div-wrapper">
                    <input class="text-wrapper-5" id="email" name="email" type="email" placeholder="seu@email.com" autocomplete="email" inputmode="email" aria-label="E-mail" />
                </div>
            </div>
            
            <div class="container-3">
                <label class="label" for="senha">
                    <img class="icon-2" src="https://c.animaapp.com/fHb26KMD/img/icon-3.svg" alt="" aria-hidden="true" />
                    <span class="text-wrapper-4">Senha</span>
                </label>
                <div class="div-wrapper">
                    <input class="text-wrapper-5" id="senha" name="senha" type="password" placeholder="••••••••" autocomplete="current-password" aria-label="Senha" />
                </div>
            </div>

            <div class="button-wrapper" style="text-align: right; width: 100%; margin-top: 8px;">
                <a href="recuperar.html" class="button-3" style="text-decoration: none; display: inline-block;">
                    <span class="text-wrapper-6">Esqueceu a senha?</span>
                </a>
            </div>

            <button class="button-4" type="submit" style="margin-top: 20px;">
                <span class="text-wrapper-7">Entrar</span>
            </button>
            
            <div class="paragraph-2" style="display: flex; gap: 5px; justify-content: center; align-items: center; margin-top: 15px; width: 100%;">
                <p class="n-o-tem-uma-conta" style="margin: 0;">Não tem uma conta?</p>
                <a href="cadastro.html" class="text-wrapper-8" aria-label="Cadastre-se" style="text-decoration: none; font-weight: bold;">Cadastre-se</a>
            </div>
            
        </form>
    </section>
</main>
</body>
</html>
