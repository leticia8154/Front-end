<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Painel de estacionamento</title>
    <link rel="stylesheet" href="globals.css">
    <link rel="stylesheet" href="css/principal.css">
  </head>
  <body>
    <main class="container" data-model-id="60:771">
      
      <button class="button" type="button" aria-label="Voltar">
        <img src="https://c.animaapp.com/YpraINo5/img/button.svg" alt="" />
      </button>

      <section class="div" aria-labelledby="saudacao-titulo">
        <header class="container-wrapper">
          <div class="div-2">
            <div class="heading">
              <h1 class="text-wrapper" id="saudacao-titulo">Olá, Letícia! 👋</h1>
            </div>
            <div class="paragraph">
              <p class="text-wrapper-2">silvaleticia0008@gmail.com</p>
            </div>
          </div>
        </header>

        <section class="div-3" aria-labelledby="shopping-atual-label">
          <div class="label">
            <p class="text-wrapper-3" id="shopping-atual-label">Shopping Atual</p>
          </div>
          <button class="button-2" type="button" aria-label="Selecionar shopping atual">
            <div class="div-4">
              <img class="icon" src="https://c.animaapp.com/YpraINo5/img/icon.svg" alt="" />
              <div class="text">
                <span class="text-wrapper-4">Brasilia Shopping</span>
              </div>
            </div>
            <img class="img" src="https://c.animaapp.com/YpraINo5/img/icon-1.svg" alt="" />
          </button>
        </section>

        <section class="div-5" aria-label="Resumo de uso">
          <article class="div-6" aria-label="Usos">
            <img class="icon-2" src="https://c.animaapp.com/YpraINo5/img/icon-2.svg" alt="" />
            <div class="div-wrapper">
              <p class="text-wrapper-5">12</p>
            </div>
            <div class="paragraph-2">
              <p class="text-wrapper-6">Usos</p>
            </div>
          </article>

          <article class="div-7" aria-label="Tempo total">
            <img class="icon-3" src="https://c.animaapp.com/YpraINo5/img/icon-3.svg" alt="" />
            <div class="paragraph-3">
              <p class="text-wrapper-7">24h</p>
            </div>
            <div class="paragraph-4">
              <p class="text-wrapper-6">Total</p>
            </div>
          </article>

          <article class="div-8" aria-label="Gasto total">
            <img class="icon-4" src="https://c.animaapp.com/YpraINo5/img/icon-4.svg" alt="" />
            <div class="paragraph-5">
              <p class="text-wrapper-7">R$ 180</p>
            </div>
            <div class="paragraph-6">
              <p class="text-wrapper-6">Gasto</p>
            </div>
          </article>
        </section>

        <button class="button-3" type="button" aria-label="Buscar vaga disponível">
          <img class="icon-5" src="https://c.animaapp.com/YpraINo5/img/icon-5.svg" alt="" />
          <span class="text-wrapper-8">Buscar Vaga Disponível</span>
        </button>
      </section>

      <nav class="div-9" aria-label="Atalhos principais">
        <button class="button-4" type="button" aria-label="Minhas vagas, vagas favoritas">
          <img class="icon-6" src="https://c.animaapp.com/YpraINo5/img/icon-6.svg" alt="" />
          <div class="heading-2">
            <h2 class="text-wrapper-9">Minhas Vagas</h2>
          </div>
          <div class="paragraph-7">
            <p class="text-wrapper-10">Vagas favoritas</p>
          </div>
        </button>

        <button class="button-5" type="button" aria-label="Histórico, ver todos usos">
          <img class="icon-6" src="https://c.animaapp.com/YpraINo5/img/icon-7.svg" alt="" />
          <div class="heading-2">
            <h2 class="text-wrapper-11">Histórico</h2>
          </div>
          <div class="paragraph-7">
            <p class="text-wrapper-10">Ver todos usos</p>
          </div>
        </button>

        <button class="button-6" type="button" aria-label="Meu perfil, editar dados">
          <img class="icon-6" src="https://c.animaapp.com/YpraINo5/img/icon-8.svg" alt="" />
          <div class="heading-2">
            <h2 class="text-wrapper-12">Meu Perfil</h2>
          </div>
          <div class="paragraph-7">
            <p class="text-wrapper-10">Editar dados</p>
          </div>
        </button>
      </nav>

      <section class="div-10" aria-labelledby="recentes-titulo">
        <div class="heading-3">
          <h2 class="text-wrapper-13" id="recentes-titulo">Estacionamentos Recentes</h2>
        </div>

        <div class="div-11">
          <article class="div-12" aria-label="Estacionamento recente Setor A2 Vaga 145">
            <div class="div-13">
              <img class="img-2" src="https://c.animaapp.com/YpraINo5/img/container-2.svg" alt="" />
              <div class="div-14">
                <div class="paragraph-8">
                  <p class="p">Setor A2 - Vaga 145</p>
                </div>
                <div class="paragraph-9"></div>
              </div>
            </div>
            <p class="text-wrapper-14">05/04/2026 • 3h 20min</p>
            <img class="img-3" src="https://c.animaapp.com/YpraINo5/img/container-1.svg" alt="" />
            <div class="paragraph-10">
              <p class="text-wrapper-15">R$ 18,00</p>
            </div>
          </article>

          <article class="div-12" aria-label="Estacionamento recente Setor B1 Vaga 089">
            <div class="div-15">
              <img class="img-2" src="https://c.animaapp.com/YpraINo5/img/container-2.svg" alt="" />
              <div class="paragraph-wrapper">
                <div class="paragraph-11">
                  <p class="text-wrapper-16">Setor B1 - Vaga 089</p>
                </div>
              </div>
            </div>
            <div class="paragraph-12">
              <p class="text-wrapper-17">02/04/2026 • 1h 45min</p>
            </div>
            <img class="img-4" src="https://c.animaapp.com/YpraINo5/img/container-3.svg" alt="" />
            <p class="text-wrapper-18">R$ 12,00</p>
          </article>
        </div>
      </section>

    </main>
  </body>
</html>
