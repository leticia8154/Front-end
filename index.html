<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta charset="utf-8" />
    <title>Sistema de Estacionamento</title>
    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<main class="sistema-de" data-model-id="1:5">
    <section class="container" aria-labelledby="titulo-boas-vindas">
        
        <header class="div">
            <div class="image-estacia" aria-hidden="true"></div>
            <div class="heading">
                <h1 class="text-wrapper" id="titulo-boas-vindas">Bem-vindo!</h1>
            </div>
            <div class="paragraph">
                <p class="p">Estacionamento inteligente ao seu alcance</p>
            </div>
        </header>
        
        <nav class="container-2" aria-label="Ações de autenticação">
            <button class="button" type="button" aria-current="page">
                <img class="icon" src="https://c.animaapp.com/fHb26KMD/img/icon.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-2">Entrar</span>
            </button>
            <a href="cadastro.html" class="button-2" type="button">
                <img class="img" src="https://c.animaapp.com/fHb26KMD/img/icon-1.svg" alt="" aria-hidden="true" />
                <span class="text-wrapper-3">Cadastrar</span>
            </a>
        </nav>

        <form class="form" action="#" method="post">
            
            <div class="container-3">
                <label class="label" for="email">
                    <img class="icon-2" src="https://c.animaapp.com/fHb26KMD/img/icon-2.svg" alt="" aria-hidden="true" />
                    <span class="text-wrapper-4">E-mail</span>
                </label>
                <div class="div-wrapper">
                    <input class="text-wrapper-5" id="email" name="email" type="email" placeholder="seu@email.com" autocomplete="email" inputmode="email" aria-label="E-mail" />
                </div>
            </div>
            
            <div class="container-3">
                <label class="label" for="senha">
                    <img class="icon-2" src="https://c.animaapp.com/fHb26KMD/img/icon-3.svg" alt="" aria-hidden="true" />
                    <span class="text-wrapper-4">Senha</span>
                </label>
                <div class="div-wrapper">
                    <input class="text-wrapper-5" id="senha" name="senha" type="password" placeholder="••••••••" autocomplete="current-password" aria-label="Senha" />
                </div>
            </div>

            <a href="recuperar.html" class="button-wrapper">
                <button class="button-3" type="button">
                    <span class="text-wrapper-6">Esqueceu a senha?</span>
                </button>
            </a>

            <button class="button-4" type="submit">
                <span class="text-wrapper-7">Entrar</span>
            </button>
            
            <div class="paragraph-2">
                <p class="n-o-tem-uma-conta">Não tem uma conta?</p>
                <a href="cadastro.html" class="text-wrapper-8" aria-label="Cadastre-se">Cadastre-se</a>
            </div>
            
        </form>
    </section>
</main>
</body>
</html>
