<!DOCTYPE html>
<html lang="pt-BR">
  <cabeça>
    <meta conjunto de caracteres="utf-8"/>
    <meta nome="janela de visualização"contente="largura=largura-do-dispositivo, escala-inicial=1"/>
    <título>Sistema de gue</título>
    <link rel="folha de estilo"href="globals.css"/>
    <link rel="folha de estilo"href="estilo.css"/>
  </cabeça>
  <corpo>
    <principal aula="sistema-de"id do modelo de dados="1:5">
      <seção aula="recipiente"aria-rótulo="Acesso ao sistema">
        <cabeçalho aula="div">
          <div aula="imagem-estacia"aria-oculto="verdadeiro"></div>
          <div aula="cabeçalho">
            <h1 aula="quebra-texto">Bem-vindo!</h1>
          </div>
          <div aula="parágrafo">
            <p aula="p">Estacionamento inteligente ao seu alcance</p>
          </div>
        </cabeçalho>
        <navegação aula="contêiner-2"aria-rótulo="Opções de acesso">
          <botão aula="botão"tipo="botão"corrente de aria="página">
            <imagem
              aula="ícone"
              src="https://c.animaapp.com/7Ow71Jko/img/icon.svg"
              alt=""
              aria-oculto="verdadeiro"
            />
            <extensão aula="text-wrapper-2">Entrar</extensão>
          </botão>
          <botão aula="botão-2"tipo="botão">
            <imagem
              aula="imagem"
              src="https://c.animaapp.com/7Ow71Jko/img/icon-1.svg"
              alt=""
              aria-oculto="verdadeiro"
            />
            <extensão aula="text-wrapper-3">Cadastro</extensão>
          </botão>
        </navegação>
        <forma aula="forma"Ação="#"método="publicar">
          <div aula="contêiner-3">
            <rótulo aula="rótulo"para="e-mail">
              <imagem
                aula="ícone-2"
                src="https://c.animaapp.com/7Ow71Jko/img/icon-2.svg"
                alt=""
                aria-oculto="verdadeiro"
              />
              <extensão aula="text-wrapper-4">E-mail</extensão>
            </rótulo>
            <div aula="div-wrapper">
              <entrada
                aula="text-wrapper-5"
                eu ia="e-mail"
                nome="e-mail"
                tipo="e-mail"
                espaço reservado="seu@email.com"
                preenchimento automático="e-mail"
                modo de entrada="e-mail"
                aria-rótulo="E-mail"
              />
            </div>
          </div>
          <div aula="contêiner-3">
            <rótulo aula="rótulo"para="senha">
              <imagem
                aula="ícone-2"
                src="https://c.animaapp.com/7Ow71Jko/img/icon-3.svg"
                alt=""
                aria-oculto="verdadeiro"
              />
              <extensão aula="text-wrapper-4">Senha</extensão>
            </rótulo>
            <div aula="div-wrapper">
              <entrada
                aula="text-wrapper-5"
                eu ia="senha"
                nome="senha"
                tipo="senha"
                espaço reservado="••••••••"
                preenchimento automático="Senha atual"
                aria-rótulo="Senha"
              />
            </div>
          </div>
          <div aula="revestimento de botão">
            <botão aula="botão-3"tipo="botão">
              <extensão aula="text-wrapper-6">Esqueceu a senha?</extensão>
            </botão>
          </div>
          <botão aula="botão-4"tipo="enviar">
            <extensão aula="text-wrapper-7">Entrar</extensão>
          </botão>
          <div aula="no-tem-conta-row">
            <p aula="no-tem-uma-conta">Não tem uma conta?</p>
            <um aula="text-wrapper-8"href="#">Cadastre-se</um>
          </div>
        </forma>
      </seção>
    </principal>
  </corpo>
</html>
